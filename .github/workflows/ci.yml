name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Apply ibis type patches
        run: uv run python -m ibis_typing.type_patch

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check
          uv run ty check
          uv run deptry .

      - name: Unit tests
        run: uv run coverage run -m pytest --exitfirst --durations=10 -m "not ibis"

      - name: DuckDB integration tests
        env:
          TEST_IBIS_BACKEND: duck
        run: uv run coverage run -m pytest --exitfirst --durations=10 -m "duck"

      - name: Trino integration tests
        env:
          TEST_IBIS_BACKEND: trino
        run: uv run coverage run -m pytest --exitfirst --durations=10 -m "trino"

      - name: Type patcher tests
        run: |
          uv run coverage run -m ibis_typing.type_patch
          uv run coverage run -m ibis_typing.ide.setup_ide

      - name: Coverage report
        run: |
          uv run coverage combine
          uv run coverage html
          uv run coverage xml
          uv run coverage report --skip-covered --sort=cover --fail-under=90

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-html
          path: coverage_html_report/

      - name: Upload to Codecov
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24  # v5.4.3
        with:
          files: coverage.xml
          fail_ci_if_error: true
